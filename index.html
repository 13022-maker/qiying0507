// 初始化 Firebase 與 Realtime Database
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 模擬 Claude artifact 的 window.storage 介面，讓 React 程式碼幾乎不用改
window.storage = {
  async get(key) {
    const snap = await db.ref("data/" + key).get();
    if (!snap.exists()) return null;
    return { key, value: snap.val() };
  },
  async set(key, value) {
    await db.ref("data/" + key).set(value);
    return { key, value };
  },
  async delete(key) {
    await db.ref("data/" + key).remove();
    return { key, deleted: true };
  },
};

  const loadAll = useCallback(async () => {
    try {

        window.storage.get(ORDERS_KEY).catch(()=>null),
        window.storage.get(CONFIG_KEY).catch(()=>null),
        window.storage.get(PINS_KEY).catch(()=>null),
        window.storage.get(SETTINGS_KEY).catch(()=>null),
      ]);
      setOrders(ro ? JSON.parse(ro.value) : []);
      setBoothConfig(rc ? JSON.parse(rc.value) : {});
      setPins(rp ? JSON.parse(rp.value) : {});
      const settings = rs ? JSON.parse(rs.value) : {};
      const dl = settings.deadline || DEFAULT_DEADLINE;
      setDeadline(dl);
      setSetDeadlineInput(dl);
    } catch { setOrders([]); setBoothConfig({}); setPins({}); setDeadline(DEFAULT_DEADLINE); }
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  const persistOrders = async (all) => { await window.storage.set(ORDERS_KEY, JSON.stringify(all)); setOrders(all); };

  const addOrder = async (order) => {
    setBusy(true);
    try {
      let all = [];
      try { const r = await window.storage.get(ORDERS_KEY); if (r) all = JSON.parse(r.value); } catch {}
      const maxNo = all.reduce((m, o) => Math.max(m, o.pickupNo || 0), 0);
      const finalOrder = { ...order, pickupNo: maxNo + 1 };
      all.push(finalOrder); await persistOrders(all); return finalOrder;
    } catch { return null; } finally { setBusy(false); }
  };

  const replaceOrder = async (oldId, newOrder) => {
    setBusy(true);
    try {
      let all = [];
      try { const r = await window.storage.get(ORDERS_KEY); if (r) all = JSON.parse(r.value); } catch {}
      const oldOrder = all.find(o => o.id === oldId);
      let pickupNo = oldOrder?.pickupNo;
      if (!pickupNo) {
        const maxNo = all.reduce((m, o) => Math.max(m, o.pickupNo || 0), 0);
        pickupNo = maxNo + 1;
      }
      const finalOrder = { ...newOrder, pickupNo };
      all = all.filter(o => o.id !== oldId); all.push(finalOrder);
      await persistOrders(all); return finalOrder;
    } catch { return null; } finally { setBusy(false); }
  };

  const removeOrder = async (orderId) => {
    try {
      let all = [];

      try { const r = await window.storage.get(ORDERS_KEY); if (r) all = JSON.parse(r.value); } catch {}
      all = all.map(o => {
        if (o.id !== orderId) return o;
        if (o.pickedUp) { const { pickedUp, pickedUpAt, ...rest } = o; return rest; }
        return { ...o, pickedUp: true, pickedUpAt: new Date().toISOString() };

      await persistOrders(all);
    } catch { alert("更新失敗，請再試一次"); }

  const toggleReady = async (orderId) => {
    try {
      let all = [];

      await persistOrders(all);
    } catch { alert("更新失敗，請再試一次"); }

    try {
      let cfg = {};
      try { const r = await window.storage.get(CONFIG_KEY); if (r) cfg = JSON.parse(r.value); } catch {}

      setBoothConfig(cfg); setEditSaved(true); setTimeout(() => setEditSaved(false), 2500);
    } catch { alert("儲存失敗，請再試一次"); } finally { setEditSaving(false); }
  };

  const resetBoothItems = async (boothId) => {
    if (!confirm("確定要還原為系統預設商品嗎？")) return;
    setEditSaving(true);
    try {
      let cfg = {};
      try { const r = await window.storage.get(CONFIG_KEY); if (r) cfg = JSON.parse(r.value); } catch {}
      delete cfg[boothId];
      await window.storage.set(CONFIG_KEY, JSON.stringify(cfg));
      setBoothConfig(cfg);
      const def = BOOTHS_DEFAULT.find(b=>b.id===boothId)?.items ?? [];
      setEditItems(def.map(i=>({...i})));
    } finally { setEditSaving(false); }
  };

  const savePin = async (boothId, pin) => {
    let p = {};
    try { const r = await window.storage.get(PINS_KEY); if (r) p = JSON.parse(r.value); } catch {}
    p[boothId] = pin;
    await window.storage.set(PINS_KEY, JSON.stringify(p));
    setPins(p);
  };

  const resetPin = async (boothId) => {
    if (!confirm(`確定要重設攤位 ${BOOTHS_DEFAULT.find(b=>b.id===boothId)?.num} 的 PIN？`)) return;
    let p = {};
    try { const r = await window.storage.get(PINS_KEY); if (r) p = JSON.parse(r.value); } catch {}
    delete p[boothId];
    await window.storage.set(PINS_KEY, JSON.stringify(p));
    setPins(p);
  };

  const saveDeadline = async () => {
    if (!setDeadlineInput) { alert("請輸入截止時間"); return; }
    let s = {};
    try { const r = await window.storage.get(SETTINGS_KEY); if (r) s = JSON.parse(r.value); } catch {}
    s.deadline = setDeadlineInput;
    await window.storage.set(SETTINGS_KEY, JSON.stringify(s));
    setDeadline(setDeadlineInput); alert("截止時間已更新");
  };

  const getSold = (boothId, itemName, excludeId) => orders.reduce((s, o) => {
    if (excludeId && o.id === excludeId) return s;
    return s + o.items.filter(i => i.boothId===boothId && i.itemName===itemName).reduce((a,b)=>a+b.qty,0);
  }, 0);
  const getRemaining = (booth, item) => {
    if (item.soldOut) return 0; // 攤位手動標記「已售完」，停止接受預購
    if (!item.stock || item.stock <= 0) return Infinity;
    const sold = getSold(booth.id, item.name, editingOrderId);
    return Math.max(0, item.stock - sold);
  };

  const ck = (bid, n, p) => `${bid}||${n}||${p}`;
  const addItem = (booth, item) => {
    const key = ck(booth.id, item.name, item.price);
    const cur = cart[key] || 0;
    if (item.soldOut) { alert(`「${item.name}」已售完，停止接單`); return; }
    const remain = getRemaining(booth, item);
    if (cur + 1 > remain) { alert(`「${item.name}」剩餘 ${remain} 份，無法再加入`); return; }
    setCart(prev => ({...prev, [key]: cur + 1}));
  };
  const removeItem = (booth, item) => {
    const key = ck(booth.id, item.name, item.price);
    setCart(prev => { const next = {...prev}; if (next[key] > 1) next[key]--; else delete next[key]; return next; });
  };
  const cartCount = Object.values(cart).reduce((a,b)=>a+b,0);
  const cartTotal = Object.entries(cart).reduce((s,[k,q])=>s+parseInt(k.split("||")[2])*q,0);

  const doLookup = async () => {
    if (!lookupName.trim() || !lookupCls.trim()) { alert("請填寫姓名與班級"); return; }

  const matchOrders = orders.filter(o => o.name === lookupName.trim() && o.class === lookupCls.trim()).sort((a,b)=>new Date(b.ts) - new Date(a.ts));
  const cancelOrder = async (orderId) => {

  const beginModify = (order) => {

    const v = adminInput.trim(); const pinV = adminPin.trim();

      loadAll(); setView("admin"); setAdminInput(""); setAdminPin(""); return;

    loadAll(); setView("admin"); setAdminInput(""); setAdminPin("");

  const completePinSetup = async () => {

    if (p !== adminPinConfirm.trim()) { alert("兩次輸入的 PIN 不一致"); return; }
    await savePin(pendingBooth.id, p);
    setAdminIsAll(false); setAdminBooth(pendingBooth); setAdminTab("orders");
    setNeedsPinSetup(false); setPendingBooth(null);
    setAdminInput(""); setAdminPin(""); setAdminPinConfirm("");

    const items = getItems(booth).map(i=>({name:i.name, price:i.price, stock:i.stock||"", soldOut:!!i.soldOut}));

  };
  const updEdit = (idx, field, val) => setEditItems(p=>p.map((it,i)=>i===idx?{...it,[field]:val}:it));
  const delEdit = (idx) => setEditItems(p=>p.filter((_,i)=>i!==idx));
  const addEdit = () => setEditItems(p=>[...p,{name:"新商品",price:30,stock:""}]);
  const saveEdits = () => {
    const cleaned = editItems.filter(i=>i.name.trim()).map(i=>{
      const out = {name:i.name.trim(), price:parseInt(i.price)||0};
      const st = parseInt(i.stock); if (st && st > 0) out.stock = st;
      if (i.soldOut) out.soldOut = true; // 手動標記為已售完，學生端會停止接單
      return out;
    });
    saveBoothItems(adminBooth.id, cleaned);
  };

  const exportCSV = (rows, filename) => {
    const csv = "\uFEFF" + rows.map(r => r.map(c => `"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 100);
  };
  const exportBoothCSV = () => {
    const booth = adminBooth;
    const my = orders.filter(o=>o.items.some(i=>i.boothId===booth.id));
    const rows = [["取餐編號","訂單編號","姓名","班級","商品","單價","數量","小計","送出時間","已取餐"]];
    my.forEach(o => o.items.filter(i=>i.boothId===booth.id).forEach(it => {
      rows.push([fmtPickup(o.pickupNo), o.id.slice(-6).toUpperCase(), o.name, o.class, it.itemName, it.price, it.qty, it.price*it.qty, fmtDT(o.ts), o.pickedUp?"是":""]);
    }));

  };
  const exportAllCSV = () => {

              <div className="text-sm font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">✅ {fmtPickup(ticketMatch.pickupNo)} 可以取餐了！請至 攤 {boothNumsOf(ticketMatch).join(", ")}</div>
            ) : (
              <div className="text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">⏳ {fmtPickup(ticketMatch.pickupNo)} 攤位尚未通知，請耐心等候</div>
            )
          )}
        </div>
        <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
          <p className="text-sm text-gray-500 mb-3">輸入下單時填寫的姓名與班級</p>
          <label className="block text-sm font-medium text-gray-500 mb-1.5">姓名</label>
          <input value={lookupName} onChange={e=>setLookupName(e.target.value)} placeholder="例：王小明" className="w-full border border-gray-200 rounded-xl px-4 py-3 mb-3 focus:outline-none focus:border-rose-400"/>
          <label className="block text-sm font-medium text-gray-500 mb-1.5">班級</label>

          <button onClick={doLookup} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-xl">查詢預購</button>
        </div>

                <div className="px-4 py-2">
                  {o.items.map((it,i)=>{ const b = BOOTHS_DEFAULT.find(x=>x.id===it.boothId); return (<div key={i} className="flex justify-between text-sm py-1"><span className="text-gray-700">攤{b?.num} {it.itemName} ×{it.qty}</span><span className="text-gray-400">NT${it.price*it.qty}</span></div>); })}

                  <button onClick={()=>beginModify(o)} disabled={closed} className="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-2 rounded-xl disabled:opacity-40">✏️ 修改</button>
                  <button onClick={()=>cancelOrder(o.id)} disabled={closed} className="flex-1 bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-2 rounded-xl disabled:opacity-40">✕ 取消</button>

              </div>

            {closed && <div className="bg-gray-100 rounded-2xl px-4 py-3 text-xs text-gray-500 text-center">🔒 預購已截止，無法修改或取消</div>}
          </>
        ))}
      </div>
    </div>
    );
  }

  if (view==="browse") {
    const openCount = BOOTHS_DEFAULT.filter(b=>pins[b.id]).length;
    let filtered = grp==="全部" ? BOOTHS_DEFAULT : BOOTHS_DEFAULT.filter(b=>b.grp===grp);
    if (onlyOpen) filtered = filtered.filter(b=>pins[b.id]);
    return (

        <div className="bg-white px-4 py-3 flex items-center gap-3 border-b border-rose-100">
          <button onClick={()=>setView("home")} className="text-rose-500 text-xl font-bold">←</button>
          <h2 className="font-bold text-rose-700 flex-1 text-lg">{editingOrderId ? "修改預購：選擇攤位" : "選擇攤位"}</h2>
          {cartCount>0 && <button onClick={()=>setView("cart")} className="bg-rose-500 text-white text-sm font-bold px-3 py-2 rounded-xl">🛒 {cartCount}件 · NT${cartTotal}</button>}
        </div>
        {editingOrderId && (<div className="bg-blue-50 border-b border-blue-100 px-4 py-2 flex justify-between items-center"><span className="text-xs text-blue-700">📝 你正在修改預購，結帳後會覆蓋原訂單</span><button onClick={cancelEditing} className="text-xs text-blue-600 underline">放棄修改</button></div>)}
        <div className="flex items-center justify-between px-4 pt-3">
          <span className="text-xs text-gray-500">已開放 <b className="text-rose-600">{openCount}</b>/{BOOTHS_DEFAULT.length} 攤</span>
          <button onClick={()=>setOnlyOpen(!onlyOpen)} className={`text-xs px-3 py-1.5 rounded-full font-medium transition-colors ${onlyOpen?"bg-green-500 text-white":"bg-white text-gray-600 border border-gray-200"}`}>{onlyOpen?"✓ 只看已開放":"只看已開放"}</button>
        </div>
        <div className="flex gap-2 px-4 py-3 overflow-x-auto" style={{scrollbarWidth:"none"}}>
          {GROUPS.map(g=>(<button key={g} onClick={()=>setGrp(g)} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${grp===g?"bg-rose-500 text-white":"bg-white text-gray-600 border border-gray-200"}`}>{g}</button>))}
        </div>
        <div className="px-4 pb-6 grid gap-3">
          {filtered.length === 0 && (<div className="bg-white rounded-2xl p-10 text-center shadow-sm"><p className="text-gray-400 text-sm">目前沒有符合條件的攤位</p>{onlyOpen && <button onClick={()=>setOnlyOpen(false)} className="text-xs text-rose-500 mt-2 underline">顯示所有攤位</button>}</div>)}
          {filtered.map(booth=>{
            const items = getItems(booth);
            const isOpen = !!pins[booth.id];
            return (
              <div key={booth.id} className={`bg-white rounded-2xl shadow-sm border border-rose-50 overflow-hidden ${!isOpen?"opacity-70":""}`}>
                <div className="px-4 py-2.5 flex items-center gap-2 border-b border-gray-50 bg-rose-50">
                  <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${GRP_COLOR[booth.grp]||"bg-gray-100 text-gray-600"}`}>{booth.grp}</span>

                      {o.pickupNo && (
                        <div className={`flex-shrink-0 mr-3 px-2.5 py-1.5 rounded-lg text-center min-w-[3.25rem] ${o.pickedUp?"bg-emerald-100 text-emerald-700":(o.ready?"bg-cyan-100 text-cyan-700":"bg-rose-100 text-rose-700")}`}>
                          <div className="text-[10px] font-medium leading-none">取餐</div>
                          <div className="text-base font-black leading-tight tracking-tight">{fmtPickup(o.pickupNo)}</div>
                        </div>
                      )}
                      <div className="flex-1 min-w-0 mr-2">
                        <div>
                          <span className={`font-bold text-sm ${o.pickedUp?"text-gray-500":"text-gray-800"}`}>{o.name}</span>
                          <span className="text-xs text-gray-400 ml-2">{o.class}</span>
                          <span className="text-[11px] font-mono text-gray-400 ml-2">#{o.id.slice(-6).toUpperCase()}</span>
                        </div>
                        <div className="text-xs text-gray-400 mt-0.5">
                          NT${sub}
                          {!o.pickedUp && o.ready && <span className="text-cyan-600 ml-2">· 已通知 {fmtDT(o.readyAt)}</span>}
                          {o.pickedUp && <span className="text-emerald-600 ml-2">· 已取於 {fmtDT(o.pickedUpAt)}</span>}
                        </div>
                      </div>
                      {/* 兩個動作鈕：通知（公告可取餐）／取餐（核銷） */}
                      <div className="flex flex-col gap-1 flex-shrink-0">
                        <button onClick={()=>toggleReady(o.id)} disabled={o.pickedUp} className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed ${o.ready?"bg-cyan-500 hover:bg-cyan-600 text-white":"bg-white border border-cyan-300 text-cyan-600 hover:bg-cyan-50"}`}>{o.ready?"✓ 已通知":"📢 通知"}</button>
                        <button onClick={()=>togglePickup(o.id)} className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-colors ${o.pickedUp?"bg-emerald-500 hover:bg-emerald-600 text-white":"bg-rose-500 hover:bg-rose-600 text-white"}`}>{o.pickedUp?"✓ 已取餐":"取餐"}</button>
                      </div>
                    </div>
                    <div className="px-4 py-2">{myI.map((it,i)=>(<div key={i} className="flex justify-between text-sm py-1"><span className={o.pickedUp?"text-gray-400":"text-gray-700"}>{it.itemName} ×{it.qty}</span><span className="text-gray-400">NT${it.price*it.qty}</span></div>))}</div>
                  </div>
                );
              })
            }
          </div>
        )}
        {adminTab==="edit" && (
          <div className="px-4 pt-4 pb-6 no-print">
            <div className="bg-blue-50 border border-blue-100 rounded-2xl px-4 py-3 text-xs text-blue-600 mb-4">
              修改後按「儲存商品設定」，所有學生的預購頁面會即時更新。<br/>
              庫存上限留空＝不限量。售完後 + 鈕會自動停用。<br/>
              現場完售時可按下方「標記為已售完」，立即停止接單。<br/>
              <span className="text-amber-600">⚠️ 已提交的訂單不會自動修正，修改前請先確認。</span>
            </div>
            <div className="bg-white rounded-2xl shadow-sm overflow-hidden mb-3">
              <div className="px-4 py-3 border-b border-gray-50 flex justify-between items-center">
                <p className="font-bold text-gray-700">商品清單</p>
                <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${boothConfig[booth.id]?"bg-amber-100 text-amber-700":"bg-gray-100 text-gray-500"}`}>{boothConfig[booth.id]?"已自訂":"系統預設"}</span>
              </div>
              {editItems.length===0 ? <div className="px-4 py-8 text-center text-gray-400 text-sm">尚無商品，請按下方按鈕新增</div> :
                editItems.map((item,idx)=>{
                  const sold = getSold(booth.id, item.name);
                  return (
                    <div key={idx} className={`px-4 py-3 border-b border-gray-50 last:border-0 ${item.soldOut?"bg-gray-50":""}`}>
                      <div className="flex gap-2 items-end">
                        <div className="flex-1 min-w-0"><label className="block text-xs text-gray-400 mb-1">商品名稱</label><input value={item.name} onChange={e=>updEdit(idx,"name",e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/></div>
                        <div className="w-16 flex-shrink-0"><label className="block text-xs text-gray-400 mb-1">售價</label><input type="number" min="1" value={item.price} onChange={e=>updEdit(idx,"price",parseInt(e.target.value)||0)} className="w-full border border-gray-200 rounded-lg px-2 py-2 text-sm text-center focus:outline-none focus:border-blue-400"/></div>
                        <div className="w-16 flex-shrink-0"><label className="block text-xs text-gray-400 mb-1">上限</label><input type="number" min="0" value={item.stock||""} onChange={e=>updEdit(idx,"stock",e.target.value)} placeholder="不限" className="w-full border border-gray-200 rounded-lg px-2 py-2 text-sm text-center focus:outline-none focus:border-blue-400"/></div>
                        <button onClick={()=>delEdit(idx)} className="w-8 h-9 rounded-lg bg-red-50 hover:bg-red-100 text-red-400 flex items-center justify-center text-xl font-bold leading-none flex-shrink-0">×</button>
                      </div>
                      {/* 完售開關：開啟後此商品停止接單；再按一次可恢復販售 */}
                      <div className="flex items-center justify-between mt-2 ml-1 gap-2 flex-wrap">
                        <button onClick={()=>updEdit(idx,"soldOut",!item.soldOut)} className={`text-xs px-2.5 py-1 rounded-md font-medium transition-colors ${item.soldOut?"bg-gray-700 text-white hover:bg-gray-800":"bg-white border border-gray-300 text-gray-600 hover:bg-gray-50"}`}>{item.soldOut?"🚫 已售完（停止接單）· 點此恢復":"標記為已售完"}</button>
                        {sold > 0 && <p className="text-xs text-amber-600">⚠️ 已預購 {sold} 份{item.stock && parseInt(item.stock) < sold ? "（超過上限）":""}</p>}
                      </div>
                    </div>
                  );
                })
              }
            </div>
            <button onClick={addEdit} className="w-full border-2 border-dashed border-blue-200 text-blue-500 font-medium py-3 rounded-2xl text-sm hover:bg-blue-50 transition-colors mb-4">＋ 新增商品</button>
            <button onClick={saveEdits} disabled={editSaving||editItems.length===0} className={`w-full font-bold py-4 rounded-2xl shadow-lg text-white text-base transition-all disabled:opacity-60 ${editSaved?"bg-green-500":"bg-blue-600 hover:bg-blue-700"}`}>{editSaving?"儲存中...":editSaved?"✓ 已儲存！商品即時更新":"儲存商品設定"}</button>
            {boothConfig[booth.id] && <button onClick={()=>resetBoothItems(booth.id)} className="w-full mt-3 text-xs text-gray-400 hover:text-gray-600 py-2">還原為系統預設商品</button>}
          </div>
        )}
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
